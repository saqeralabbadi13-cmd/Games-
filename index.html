<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاهة الأسهم المضيئة ثلاثية الأبعاد</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, #0f1123 0%, #05060f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        /* تأثير النجوم في الخلفية لمحاكاة الفضاء كما في صورتك */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            pointer-events: none;
            opacity: 0.4;
        }
        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .level-title {
            color: #00f0ff;
            font-size: 26px;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }
        .moves-count {
            color: #fff;
            font-size: 18px;
            margin: 5px 0 0 0;
        }
        #hint-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #8ee000;
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 224, 0, 0.4);
            transition: all 0.2s ease;
        }
        #hint-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(142, 224, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div class="stars"></div>

    <div id="header">
        <p class="level-title">المستوى 1</p>
        <p class="moves-count">🔄 <span id="moves">0</span></p>
    </div>

    <button id="hint-btn" onclick="resetGame()">إعادة تعيين</button>

<script>
    // إعداد المشهد والأنيميشن ثلاثي الأبعاد
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // إضاءة ناعمة تناسب التأثيرات الفسفورية
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambientLight);

    camera.position.set(0, 0, 7);

    // تصميم مسارات المتاهة المضيئة (بدون مربعات وبشكل خطوط ممتدة وأسهم)
    // الإحداثيات تمثل نقاط الانعطاف والأسهم لكل وجه من أوجه المكعب الستة
    const pathsConfig = [
        // الوجه 0 (الأمامي)
        [
            { start: [0.1, 0.5], points: [[0.4, 0.5], [0.4, 0.2], [0.8, 0.2]], hasArrow: true },
            { start: [0.2, 0.8], points: [[0.2, 0.6], [0.6, 0.6], [0.6, 0.9]], hasArrow: true },
            { start: [0.5, 0.4], points: [[0.9, 0.4]], hasArrow: true }
        ],
        // الوجه 1 (الخلفي)
        [
            { start: [0.2, 0.2], points: [[0.2, 0.5], [0.7, 0.5]], hasArrow: true },
            { start: [0.5, 0.1], points: [[0.5, 0.8]], hasArrow: true }
        ],
        // الوجه 2 (الأعلى)
        [
            { start: [0.1, 0.2], points: [[0.8, 0.2], [0.8, 0.7]], hasArrow: true },
            { start: [0.3, 0.5], points: [[0.3, 0.9]], hasArrow: true }
        ],
        // الوجه 3 (الأسفل)
        [
            { start: [0.2, 0.8], points: [[0.7, 0.8], [0.7, 0.3]], hasArrow: true }
        ],
        // الوجه 4 (الأيمن)
        [
            { start: [0.1, 0.3], points: [[0.5, 0.3], [0.5, 0.7]], hasArrow: true }
        ],
        // الوجه 5 (الأيسر)
        [
            { start: [0.9, 0.5], points: [[0.3, 0.5], [0.3, 0.1]], hasArrow: true }
        ]
    ];

    let currentFace = 0;
    let movesCount = 0;
    let cubeMesh;
    let materials = [];

    // دالة مخصصة لرسم الخطوط والأسهم المضيئة (Neon) على قماش ثنائي الأبعاد وتحويلها إلى ملمس ثلاثي الأبعاد
    function drawNeonPath(faceIndex, isCurrent) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');

        // لون خلفية الوجه (شفاف داكن مائل للون الفضاء في الصورة)
        ctx.fillStyle = 'rgba(16, 18, 35, 0.85)';
        ctx.fillRect(0, 0, 512, 512);

        // رسم حواف خفيفة جداً للوجه البرمجي
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, 512, 512);

        const paths = pathsConfig[faceIndex] || [];

        paths.forEach(path => {
            ctx.beginPath();
            ctx.moveTo(path.start[0] * 512, path.start[1] * 512);
            
            path.points.forEach(p => {
                ctx.lineTo(p[0] * 512, p[1] * 512);
            });

            // إعدادات تأثير التوهج المضيء (Neon Glow)
            if (isCurrent) {
                ctx.strokeStyle = '#b55fe6'; // اللون البنفسجي المضيء للمسار الفعال مثل صورتك
                ctx.shadowColor = '#b55fe6';
                ctx.shadowBlur = 15;
            } else {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; // لون رمادي للمسارات الأخرى
                ctx.shadowBlur = 0;
            }
            
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // رسم رأس السهم في نهاية الخط
            if (path.hasArrow && path.points.length > 0) {
                const lastPoint = path.points[path.points.length - 1];
                const prevPoint = path.points[path.length - 2] || path.start;
                
                const x1 = prevPoint[0] * 512;
                const y1 = prevPoint[1] * 512;
                const x2 = lastPoint[0] * 512;
                const y2 = lastPoint[1] * 512;

                const angle = Math.atan2(y2 - y1, x2 - x1);
                
                ctx.fillStyle = isCurrent ? '#b55fe6' : 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x2 - 25 * Math.cos(angle - Math.PI / 6), y2 - 25 * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(x2 - 25 * Math.cos(angle + Math.PI / 6), y2 - 25 * Math.sin(angle + Math.PI / 6));
                ctx.fill();
            }
        });

        return new THREE.CanvasTexture(canvas);
    }

    function updateCube() {
        materials = [];
        // ترتيب أوجه Three.js: [أيمن، أيسر، أعلى، أسفل، أمامي، خلفي]
        const faceMapping = [4, 5, 2, 3, 0, 1]; 
        
        for (let i = 0; i < 6; i++) {
            const actualFace = faceMapping[i];
            const texture = drawNeonPath(actualFace, actualFace === currentFace);
            materials.push(new THREE.MeshBasicMaterial({ map: texture, transparent: true }));
        }

        if (cubeMesh) {
            cubeMesh.material = materials;
        }
    }

    // إنشاء المكعب المتاهة
    const geometry = new THREE.BoxGeometry(3, 3, 3);
    updateCube();
    cubeMesh = new THREE.Mesh(geometry, materials);
    scene.add(cubeMesh);

    // إضافة تأثير دوران مستمر وتلقائي خفيف جداً للمكعب ليعطي شعوراً بالجاذبية وثلاثية الأبعاد
    let isTransitioning = false;

    // استشعار النقر على الشاشة للتحرك والتدوير السلس للوجه التالي
    window.addEventListener('pointerdown', onDocumentPointerDown);

    function onDocumentPointerDown(event) {
        if (isTransitioning) return;

        movesCount++;
        document.getElementById('moves').innerText = movesCount;

        // الانتقال للوجه التالي بترتيب حركي سلس وثلاثي أبعاد دقيق
        currentFace = (currentFace + 1) % 6;
        updateCube();
        rotateCubeToFace(currentFace);
    }

    // دالة تدوير المكعب بشكل انسيابي فائق النعومة بناءً على الأوجه
    function rotateCubeToFace(face) {
        isTransitioning = true;
        let targetRotation = { x: 0, y: 0, z: 0 };

        switch(face) {
            case 0: targetRotation = { x: 0, y: 0, z: 0 }; break; // الأمامي
            case 4: targetRotation = { x: 0, y: -Math.PI / 2, z: 0 }; break; // الأيمن
            case 1: targetRotation = { x: 0, y: Math.PI, z: 0 }; break; // الخلفي
            case 5: targetRotation = { x: 0, y: Math.PI / 2, z: 0 }; break; // الأيسر
            case 2: targetRotation = { x: Math.PI / 2, y: 0, z: 0 }; break; // الأعلى
            case 3: targetRotation = { x: -Math.PI / 2, y: 0, z: 0 }; break; // الأسفل
        }

        // استخدام TWEEN للحصول على حركة دوران في غاية السلاسة كالألعاب الجاهزة
        new TWEEN.Tween(cubeMesh.rotation)
            .to(targetRotation, 800)
            .easing(TWEEN.Easing.Cubic.Out)
            .onComplete(() => {
                isTransitioning = false;
            })
            .start();
    }

    function resetGame() {
        if (isTransitioning) return;
        currentFace = 0;
        movesCount = 0;
        document.getElementById('moves').innerText = movesCount;
        updateCube();
        new TWEEN.Tween(cubeMesh.rotation).to({ x: 0, y: 0, z: 0 }, 500).start();
    }

    // حلقة التحديث المستمر لإطار الرسوميات (Animation Loop)
    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        
        // دوران خفيف للمكعب عند الوقوف لإبراز التأثير ثلاثي الأبعاد
        if (!isTransitioning && cubeMesh) {
            cubeMesh.rotation.y += 0.002;
        }

        renderer.render(scene, camera);
    }

    animate();

    // استجابة اللعبة الكاملة عند تغيير حجم الشاشة أو تدوير الهاتف
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
