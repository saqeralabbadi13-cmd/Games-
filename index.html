<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاهة الأسهم المضيئة الاحترافية</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, #0f1123 0%, #05060f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            pointer-events: none;
            opacity: 0.3;
        }
        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .level-title {
            color: #00f0ff;
            font-size: 26px;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }
        .moves-count {
            color: #fff;
            font-size: 18px;
            margin: 5px 0 0 0;
        }
        #hint-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #8ee000;
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 224, 0, 0.4);
            transition: all 0.2s ease;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div class="stars"></div>

    <div id="header">
        <p class="level-title">مستوى المتاهة</p>
        <p class="moves-count">الخطوات الحالية: <span id="moves">0</span></p>
    </div>

    <button id="hint-btn" onclick="resetGame()">إعادة تعيين</button>

<script>
    const scene = new THREE.Scene();
    
    // إعداد الكاميرا وإبعادها لجعل المكعب يبدو أصغر وأوضح في وسط الشاشة
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 9); // تم تغيير المسافة من 7 إلى 9 ليعود المكعب للخلف

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);

    // بناء شبكة من المسارات التي تتبع بعضها البعض وتنتهي بأسهم
    const pathsConfig = [
        // الوجه 0 (الأمامي)
        [
            { id: 0, start: [0.1, 0.5], points: [[0.5, 0.5]], nextFace: 0, nextPathId: 1, dir: 'RIGHT' },
            { id: 1, start: [0.5, 0.5], points: [[0.5, 0.9]], nextFace: 2, nextPathId: 0, dir: 'UP' } // ينقلك للوجه الأعلى
        ],
        // الوجه 1 (الخلفي)
        [
            { id: 0, start: [0.5, 0.1], points: [[0.5, 0.5]], nextFace: 0, nextPathId: 0, dir: 'DOWN' }
        ],
        // الوجه 2 (الأعلى)
        [
            { id: 0, start: [0.5, 0.1], points: [[0.8, 0.1]], nextFace: 4, nextPathId: 0, dir: 'RIGHT' } // ينقلك للوجه الأيمن
        ],
        // الوجه 3 (الأسفل)
        [
            { id: 0, start: [0.5, 0.9], points: [[0.5, 0.5]], nextFace: 1, nextPathId: 0, dir: 'UP' }
        ],
        // الوجه 4 (الأيمن)
        [
            { id: 0, start: [0.1, 0.1], points: [[0.1, 0.6], [0.7, 0.6]], nextFace: 0, nextPathId: 0, dir: 'FINAL' } // سهم النهاية
        ],
        // الوجه 5 (الأيسر)
        [
            { id: 0, start: [0.9, 0.5], points: [[0.5, 0.5]], nextFace: 0, nextPathId: 0, dir: 'LEFT' }
        ]
    ];

    let currentFace = 0;
    let currentPathId = 0;
    let movesCount = 0;
    let cubeMesh;
    let materials = [];
    let isTransitioning = false;

    // دالة الرسم النيونية بدون مربعات
    function drawNeonPath(faceIndex) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = 'rgba(16, 18, 35, 0.9)';
        ctx.fillRect(0, 0, 512, 512);

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, 512, 512);

        const paths = pathsConfig[faceIndex] || [];

        paths.forEach(path => {
            ctx.beginPath();
            ctx.moveTo(path.start[0] * 512, path.start[1] * 512);
            path.points.forEach(p => ctx.lineTo(p[0] * 512, p[1] * 512));

            // تحديد إذا كان هذا السهم هو السهم النشط الذي يقف عليه اللاعب حالياً
            const isActive = (faceIndex === currentFace && path.id === currentPathId);

            ctx.strokeStyle = isActive ? '#c075ff' : 'rgba(255, 255, 255, 0.2)';
            ctx.shadowColor = isActive ? '#c075ff' : 'transparent';
            ctx.shadowBlur = isActive ? 15 : 0;
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // رسم السهم المضيء في نهاية خط المسار
            if (path.points.length > 0) {
                const lastPoint = path.points[path.points.length - 1];
                const prevPoint = path.points[path.points.length - 2] || path.start;
                
                const x1 = prevPoint[0] * 512;
                const y1 = prevPoint[1] * 512;
                const x2 = lastPoint[0] * 512;
                const y2 = lastPoint[1] * 512;

                const angle = Math.atan2(y2 - y1, x2 - x1);
                
                ctx.fillStyle = isActive ? '#c075ff' : 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x2 - 25 * Math.cos(angle - Math.PI / 6), y2 - 25 * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(x2 - 25 * Math.cos(angle + Math.PI / 6), y2 - 25 * Math.sin(angle + Math.PI / 6));
                ctx.fill();
            }
        });

        return new THREE.CanvasTexture(canvas);
    }

    function updateCube() {
        materials = [];
        const faceMapping = [4, 5, 2, 3, 0, 1]; 
        for (let i = 0; i < 6; i++) {
            const texture = drawNeonPath(faceMapping[i]);
            materials.push(new THREE.MeshBasicMaterial({ map: texture, transparent: true }));
        }
        if (cubeMesh) cubeMesh.material = materials;
    }

    const geometry = new THREE.BoxGeometry(3, 3, 3);
    updateCube();
    cubeMesh = new THREE.Mesh(geometry, materials);
    scene.add(cubeMesh);

    // استقبال الضغطات على الشاشة لتتبع وحركة السهم
    window.addEventListener('pointerdown', () => {
        if (isTransitioning) return;

        const currentPath = pathsConfig[currentFace].find(p => p.id === currentPathId);
        
        if (currentPath) {
            movesCount++;
            document.getElementById('moves').innerText = movesCount;

            if (currentPath.dir === 'FINAL') {
                alert("🎉 مبروك! لقد تتبعت الأسهم وحللت المتاهة بنجاح!");
                resetGame();
                return;
            }

            // الانتقال إلى السهم التالي (سواء على نفس الوجه أو على وجه آخر)
            const oldFace = currentFace;
            currentFace = currentPath.nextFace;
            currentPathId = currentPath.nextPathId;

            updateCube();

            // إذا كان السهم ينقل اللاعب لوجه جديد، يدور المكعب بسلاسة
            if (oldFace !== currentFace) {
                rotateCubeToFace(currentFace);
            }
        }
    });

    function rotateCubeToFace(face) {
        isTransitioning = true;
        let targetRotation = { x: 0, y: 0, z: 0 };

        switch(face) {
            case 0: targetRotation = { x: 0, y: 0, z: 0 }; break;
            case 4: targetRotation = { x: 0, y: -Math.PI / 2, z: 0 }; break;
            case 1: targetRotation = { x: 0, y: Math.PI, z: 0 }; break;
            case 5: targetRotation = { x: 0, y: Math.PI / 2, z: 0 }; break;
            case 2: targetRotation = { x: Math.PI / 2, y: 0, z: 0 }; break;
            case 3: targetRotation = { x: -Math.PI / 2, y: 0, z: 0 }; break;
        }

        new TWEEN.Tween(cubeMesh.rotation)
            .to(targetRotation, 600)
            .easing(TWEEN.Easing.Cubic.Out)
            .onComplete(() => { isTransitioning = false; })
            .start();
    }

    function resetGame() {
        currentFace = 0;
        currentPathId = 0;
        movesCount = 0;
        document.getElementById('moves').innerText = movesCount;
        updateCube();
        new TWEEN.Tween(cubeMesh.rotation).to({ x: 0, y: 0, z: 0 }, 500).start();
    }

    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        
        // تأثير ميلان خفيف جداً وتلقائي للمكعب لتأكيد البعد الثالث دون حجب اللعب
        if (!isTransitioning && cubeMesh) {
            cubeMesh.rotation.y = Math.sin(time * 0.001) * 0.08;
            cubeMesh.rotation.x = Math.cos(time * 0.001) * 0.05;
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
