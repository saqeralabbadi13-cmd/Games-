<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاهة شعاع الليزر ثلاثية الأبعاد</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, #0c0d14 0%, #030307 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            pointer-events: none;
            opacity: 0.25;
        }
        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .level-title {
            color: #00f0ff;
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .counter {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        #hint-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #8ee000;
            color: #000;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 224, 0, 0.4);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div class="stars"></div>

    <div id="header">
        <p class="level-title">المستوى 18</p>
        <div class="counter">⬆️ <span id="moves">39</span></div>
    </div>

    <button id="hint-btn" onclick="resetGame()">Hint</button>

<script>
    // 1. إعداد المشهد والكاميرا البعيدة (بحجم وشكل الفيديو تماماً)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4, 4, 8); // مسافة تجعل المكعب في منتصف الشاشة وبحجم مثالي ومريح

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // إضافة تحكم يدوي بالماوس/اللمس لتدوير المكعب بسلاسة لاستكشاف الأوجه
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = false;

    // 2. رسم مسارات المتاهة الممتدة والمتصلة التي تلتف حول حواف المكعب
    // تم رسمها كخطوط ثلاثية الأبعاد (Lines) لتتحرك بداخلها نبضة الليزر
    const mazePoints = [
        new THREE.Vector3(-1.5, 0, 1.51),    // البداية على الوجه الأمامي
        new THREE.Vector3(0, 0, 1.51),       // خط مستقيم
        new THREE.Vector3(0, 1.2, 1.51),     // صعود للأعلى
        new THREE.Vector3(1.51, 1.2, 1.2),   // الالتفاف حول الحافة إلى الوجه الأيمن!
        new THREE.Vector3(1.51, -0.5, 1.2),  // نزول لأسفل الوجه الأيمن
        new THREE.Vector3(1.51, -0.5, -0.5), // تحرك للخلف
        new THREE.Vector3(0, -1.51, -0.5),   // الالتفاف إلى الوجه السفلي
        new THREE.Vector3(0, -1.51, 1.0),    // تحرك للأمام
        new THREE.Vector3(0, -1.2, 1.51)     // العودة للوجه الأمامي كحلقة ممتدة
    ];

    // رسم المسار الأساسي الرمادي (المتاهة الخلفية)
    const lineGeometry = new THREE.BufferGeometry().setFromPoints(mazePoints);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x333545, linewidth: 3 });
    const baseGrid = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(baseGrid);

    // 3. إنشاء هيكل المكعب الشفاف الحاضن للمتاهة
    const cubeGeo = new THREE.BoxGeometry(3, 3, 3);
    const cubeMat = new THREE.MeshBasicMaterial({
        color: 0x181a26,
        transparent: true,
        opacity: 0.2,
        wireframe: false
    });
    const mainCube = new THREE.Mesh(cubeGeo, cubeMat);
    scene.add(mainCube);

    // إضافة حواف مضيئة خفيفة للمكعب لتعطيه مظهر زجاجي مستقبلي
    const edges = new THREE.EdgesGeometry(cubeGeo);
    const lineEdges = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2a2d42, linewidth: 1 }));
    scene.add(lineEdges);

    // 4. إنشاء خط الليزر المضيء البنفسجي المتحرك (المقذوف)
    const laserGeometry = new THREE.BufferGeometry();
    const laserMaterial = new THREE.LineBasicMaterial({
        color: 0xda70ff, // اللون البنفسجي المضيء مثل الفيديو تماماً
        linewidth: 6
    });
    const laserLine = new THREE.Line(laserGeometry, laserMaterial);
    scene.add(laserLine);

    // 5. منطق حركة الليزر الممتد وسريان الشعاع عند الضغط
    let currentPointIndex = 0;
    let isLaserMoving = false;
    let activeLaserPoints = [mazePoints[0]]; 
    let moves = 39;

    // تحديث شكل شعاع الليزر على الشاشة
    function drawLaser() {
        laserGeometry.setFromPoints(activeLaserPoints);
    }
    drawLaser();

    // تشغيل الشعاع وتحريكه عند النقر على الشاشة
    window.addEventListener('pointerdown', (e) => {
        // نمنع التفاعل إذا كان خط الليزر يتحرك بالفعل أو إذا كان اللاعب يقوم بتدوير المكعب
        if (isLaserMoving || controls.state === 1) return;

        isLaserMoving = true;
        moves--;
        document.getElementById('moves').innerText = moves;

        animateLaserStep();
    });

    function animateLaserStep() {
        if (currentPointIndex >= mazePoints.length - 1) {
            // عند اكتمال المسار وحل المتاهة
            setTimeout(() => {
                alert("🎉 رائعة! وصل خط الليزر للنهاية بنجاح!");
                resetGame();
            }, 300);
            return;
        }

        const startPt = mazePoints[currentPointIndex];
        const endPt = mazePoints[currentPointIndex + 1];
        
        let progress = { t: 0 };
        
        // تحريك رأس الشعاع بسلاسة فائقة بين نقطتين متتاليتين في الفضاء ثلاثي الأبعاد
        new TWEEN.Tween(progress)
            .to({ t: 1 }, 250) // سرعة انطلاق ليزرية رشيقة وسلسة
            .easing(TWEEN.Easing.Linear.None)
            .onUpdate(() => {
                // حساب النقطة الحالية للشعاع أثناء اندفاعه
                const currentPos = new THREE.Vector3().lerpVectors(startPt, endPt, progress.t);
                
                // تحديث مصفوفة النقاط المضيئة ليمتد الخط بشكل مستمر
                if (activeLaserPoints.length > currentPointIndex + 1) {
                    activeLaserPoints[currentPointIndex + 1] = currentPos;
                } else {
                    activeLaserPoints.push(currentPos);
                }
                drawLaser();
            })
            .onComplete(() => {
                currentPointIndex++;
                // الانتقال فوراً للنقطة والوجه التالي ليظهر الانعطاف المستمر حول الحواف
                animateLaserStep();
            })
            .start();
    }

    // دالة إعادة تعيين اللعبة ومسح شعاع الليزر
    function resetGame() {
        TWEEN.removeAll();
        currentPointIndex = 0;
        isLaserMoving = false;
        activeLaserPoints = [mazePoints[0]];
        drawLaser();
        moves = 39;
        document.getElementById('moves').innerText = moves;
        // إعادة الكاميرا لوضعها الأصلي المريح للرؤية
        new TWEEN.Tween(camera.position).to({ x: 4, y: 4, z: 8 }, 600).start();
    }

    // 6. حلقة الأنيميشن والتحديث المستمر للمشهد (Animation Loop)
    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        controls.update(); // المحافظة على سلاسة الدوران اليدوي بالإصبع
        renderer.render(scene, camera);
    }
    animate();

    // تجاوب أبعاد اللعبة الكامل عند تدوير الشاشة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
